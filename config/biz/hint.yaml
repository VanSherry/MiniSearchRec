# ============================================================
# MiniSearchRec - Hint 相关搜索（点后推）配置
# 参考：通用搜索框架 CLICKHINT 业务
# ============================================================

hint:
  max_results: 8
  recall:
    tag_match:
      enable: true
      weight: 0.4
      max_recall: 15
    category_hot:
      enable: true
      weight: 0.3
      max_recall: 15
    behavior_cooccur:
      enable: true
      weight: 0.4
      max_recall: 20
    query_expand:
      enable: true
      weight: 0.2
      max_recall: 10
  rank:
    tag_overlap_weight: 0.4
    cooccur_weight: 0.4
    freshness_weight: 0.2
  filter:
    min_len: 2
    max_len: 20
    dedup_edit_distance: 3
