# ============================================================
# MiniSearchRec - 过滤配置
# ============================================================

# 过滤阶段配置
filter_stages:
  - name: "DedupFilterProcessor"
    params:
      similarity_threshold: 0.9

  - name: "QualityFilterProcessor"
    params:
      min_quality_score: 0.3
      min_click_count: 0
      min_content_length: 50

  - name: "SpamFilterProcessor"
    params:
      spam_threshold: 0.8

  - name: "BlacklistFilterProcessor"
    params:
      blacklist_file: "./config/blacklist.txt"
