# ============================================================
# MiniSearchRec - 召回策略配置
# 参考：微信 Miner 平台召回配置
# ============================================================

# 召回阶段配置
recall_stages:
  - name: "InvertedRecallProcessor"
    enable: true
    max_recall: 1000
    params:
      min_term_freq: 1

  - name: "UserHistoryRecallProcessor"
    enable: true
    max_recall: 200
    params:
      history_window_days: 30

  - name: "HotContentRecallProcessor"
    enable: true
    max_recall: 100
    params:
      time_window_hours: 24
      refresh_interval_sec: 300   # 热榜缓存刷新间隔（秒）

  # 向量召回：需要先为文档和 query 生成 embedding 才能启用
  # 文档 embedding 通过 tools/build_vector_index 构建
  # query embedding 需在 QueryParser 中调用 embedding 服务后设置
  # - name: "VectorRecallProcessor"
  #   enable: true
  #   max_recall: 200
  #   params:
  #     top_k: 200
  #     similarity_threshold: 0.7
