# ============================================================
# MiniSearchRec - 全局配置
# 参考：mmsearchqxcommon 配置驱动设计
# ============================================================

# 服务器配置
server:
  port: 8080
  host: "0.0.0.0"
  worker_threads: 4
  request_timeout_ms: 200

# 索引配置
index:
  data_dir: "./data/"
  index_dir: "./index/"
  rebuild_on_start: false
  rebuild_batch_size: 1000

# 日志配置
logging:
  level: "info"          # trace, debug, info, warn, error
  file: "./logs/minisearchrec.log"
  max_size_mb: 100
  max_files: 5

# 缓存配置
cache:
  enable: true
  local_capacity: 100
  redis_host: "127.0.0.1"
  redis_port: 6379
  default_ttl_seconds: 300

# Pipeline 全局配置
pipeline:
  final_result_count: 20
  enable_cache: true

# Embedding 向量服务配置
# 切换真实模型只需修改此处，无需改代码
embedding:
  provider: "pseudo"       # pseudo（内置伪向量） / http（远程服务）
  dim: 64                  # 输出维度：pseudo=64, bge-small=384, bge-base=768
  # --- 以下仅 provider=http 时生效 ---
  # endpoint: "http://localhost:8000/v1/embeddings"
  # model: "bge-base-zh-v1.5"
  # api_key: ""
