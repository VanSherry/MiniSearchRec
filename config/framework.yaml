# ============================================================
# MiniSearchRec - 框架层配置
# 所有与框架/平台相关的公共配置集中于此
# 业务特有配置在 config/biz/ 下各自独立
# ============================================================

# ── 服务器 ──
server:
  port: 8080
  host: "0.0.0.0"
  worker_threads: 4
  request_timeout_ms: 200

# ── 日志 ──
logging:
  level: "info"          # trace, debug, info, warn, error
  file: "./logs/minisearchrec.log"
  max_size_mb: 100
  max_files: 5

# ── 索引 ──
index:
  data_dir: "./data/"
  index_dir: "./index/"
  rebuild_on_start: false
  rebuild_batch_size: 1000

# ── 缓存 ──
cache:
  enable: true
  local_capacity: 100
  redis_host: "127.0.0.1"
  redis_port: 6379
  default_ttl_seconds: 300

# ── Pipeline 全局 ──
pipeline:
  final_result_count: 20
  enable_cache: true

# ── Embedding 向量服务 ──
# provider 可选：pseudo（默认伪向量）/ onnx（内置模型）/ http（远程服务）
embedding:
  provider: "onnx"
  dim: 768
  model_path: "models/bge-base-zh/model.onnx"
  tokenizer_path: "models/bge-base-zh/vocab.txt"
  max_seq_len: 512
  # --- http 模式（备用）---
  # provider: "http"
  # endpoint: "http://localhost:8000/v1/embeddings"
  # model: "bge-base-zh-v1.5"
  # --- pseudo 模式（无模型时降级）---
  # provider: "pseudo"
  # dim: 64

# ── 后台任务 ──
background:
  auto_train:
    enable: true
    interval_hours: 24          # 训练间隔（小时）
    min_events: 500             # 事件阈值（触发提前训练）
    check_interval_sec: 300     # 检查频率（秒）
    train_script: "./scripts/train_rank_model.py"
    model_output: "./models/rank_model.txt"
    events_db: "./data/events.db"
    docs_db: "./data/docs.db"
    train_data_output: "./data/train.txt"
    dump_tool: "./build/dump_train_data"
  auto_index_rebuild:
    enable: true
    interval_hours: 12          # 重建间隔（小时）
    min_doc_changes: 10         # 最小文档变更数
    check_interval_sec: 600     # 检查频率（秒）
  sug_trie_rebuild:
    enable: true
    interval_sec: 3600          # Trie 重建间隔（秒）

# ── 业务注册（Handler 路由表）──
# 框架启动时读取此列表，反射创建 Handler 并注册到路由表
# 新增业务：添加一条 + 写 Handler + REGISTER_MSR_HANDLER 宏
businesses:
  - business_type: "search"
    handler_name: "SearchBizHandler"
    session_name: "SearchSession"
    skip_search: false
    skip_rank: false
    skip_interpose: false

  - business_type: "sug"
    handler_name: "SugBizHandler"
    session_name: "Session"

  - business_type: "hint"
    handler_name: "HintBizHandler"
    session_name: "Session"

  - business_type: "nav"
    handler_name: "NavBizHandler"
    session_name: "Session"
